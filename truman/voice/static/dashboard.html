<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>Truman</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #0a0a0f; color: #e8e8f0; font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif; height: 100dvh; display: flex; flex-direction: column; overflow: hidden; }

  /* Header */
  .header { padding: 14px 18px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid #1a1a2e; background: #0d0d1a; }
  .header h1 { font-size: 17px; font-weight: 600; letter-spacing: 0.05em; color: #a78bfa; }
  .mac-dot { width: 8px; height: 8px; border-radius: 50%; background: #ef4444; transition: background 0.3s; }
  .mac-dot.on { background: #22c55e; }
  .hdr-btn { background: none; border: 1px solid #2a2a4a; border-radius: 8px; color: #7c7caa; font-size: 11px; padding: 4px 10px; cursor: pointer; }
  .hdr-btn:hover { border-color: #4f46e5; color: #a78bfa; }
  .session-bar { padding: 6px 14px; background: #0a0a12; border-bottom: 1px solid #1a1a2e; display: flex; gap: 6px; overflow-x: auto; }
  .session-tab { background: #16162a; border: 1px solid #2a2a4a; border-radius: 8px; color: #7c7caa; font-size: 11px; padding: 4px 12px; cursor: pointer; white-space: nowrap; }
  .session-tab.active { border-color: #4f46e5; color: #a78bfa; background: #1a1a3a; }
  .session-tab:hover { border-color: #4f46e5; }

  /* Messages */
  .messages { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 12px; scroll-behavior: smooth; }
  .messages::-webkit-scrollbar { width: 0; }

  .msg { max-width: 88%; display: flex; flex-direction: column; gap: 4px; }
  .msg.user { align-self: flex-end; align-items: flex-end; }
  .msg.truman { align-self: flex-start; }

  .bubble { padding: 10px 14px; border-radius: 16px; font-size: 15px; line-height: 1.5; }
  .msg.user .bubble { background: #4f46e5; color: #fff; border-bottom-right-radius: 4px; }
  .msg.truman .bubble { background: #16162a; color: #e8e8f0; border-bottom-left-radius: 4px; border: 1px solid #1e1e3a; }

  .meta { font-size: 11px; color: #555570; display: flex; gap: 6px; flex-wrap: wrap; }
  .msg.user .meta { justify-content: flex-end; }
  .badge { background: #1a1a2e; border: 1px solid #2a2a4a; border-radius: 6px; padding: 1px 6px; font-size: 10px; color: #7c7caa; }
  .badge.pool-coding { color: #34d399; border-color: #065f46; }
  .badge.pool-design { color: #60a5fa; border-color: #1e3a5f; }
  .badge.pool-creative { color: #f472b6; border-color: #5f1e3a; }
  .badge.pool-general { color: #a78bfa; border-color: #3a1e5f; }
  .badge.tool { color: #fbbf24; border-color: #5f4a1e; }

  /* Status indicator */
  .status-line { align-self: flex-start; font-size: 13px; color: #7c7caa; padding: 6px 4px; display: flex; align-items: center; gap: 8px; }
  .status-line .bar { width: 3px; height: 16px; border-radius: 2px; background: #4f46e5; animation: statusPulse 1s infinite; }
  .status-text { animation: statusFade 2s infinite; }
  @keyframes statusPulse { 0%,100% { opacity: 1; transform: scaleY(1); } 50% { opacity: 0.4; transform: scaleY(0.6); } }
  @keyframes statusFade { 0%,100% { opacity: 1; } 50% { opacity: 0.5; } }

  /* Input area */
  .input-area { padding: 12px 14px; border-top: 1px solid #1a1a2e; background: #0d0d1a; display: flex; gap: 10px; align-items: flex-end; }
  textarea { flex: 1; background: #16162a; border: 1px solid #2a2a4a; border-radius: 14px; padding: 10px 14px; color: #e8e8f0; font-size: 15px; resize: none; outline: none; max-height: 120px; line-height: 1.4; font-family: inherit; }
  textarea::placeholder { color: #44445a; }
  textarea:focus { border-color: #4f46e5; }

  .btn { width: 42px; height: 42px; border-radius: 50%; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: all 0.2s; }
  .send-btn { background: #4f46e5; }
  .send-btn:hover { background: #4338ca; }
  .send-btn:active { transform: scale(0.93); }
  .voice-btn { background: #16162a; border: 1px solid #2a2a4a; }
  .voice-btn.listening { background: #7c3aed; border-color: #7c3aed; animation: pulse 1.5s infinite; }
  @keyframes pulse { 0%,100% { box-shadow: 0 0 0 0 rgba(124,58,237,0.4); } 50% { box-shadow: 0 0 0 8px rgba(124,58,237,0); } }

  svg { pointer-events: none; }

  /* Tasks strip — live background work progress */
  .tasks-strip { padding:0 14px; background:#0a0a12; border-bottom:1px solid #1a1a2e; display:none; flex-direction:column; gap:0; max-height:180px; overflow-y:auto; }
  .tasks-strip.visible { display:flex; padding:6px 14px; }
  .task-row { display:grid; grid-template-columns:18px 1fr auto; gap:8px; align-items:center; padding:6px 0; border-bottom:1px solid #14142a; font-size:11px; }
  .task-row:last-child { border-bottom:none; }
  .task-icon { font-size:13px; }
  .task-icon.done { color:#22c55e; }
  .task-icon.run  { color:#a78bfa; animation:taskSpin 2s linear infinite; }
  .task-icon.fail { color:#ef4444; }
  @keyframes taskSpin { 0%{opacity:0.4} 50%{opacity:1} 100%{opacity:0.4} }
  .task-info  { display:flex; flex-direction:column; gap:3px; min-width:0; }
  .task-title { color:#e8e8f0; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; font-size:11px; }
  .task-stage { color:#7c7caa; font-size:10px; }
  .task-bar   { width:100%; height:3px; background:#16162a; border-radius:2px; overflow:hidden; margin-top:2px; }
  .task-bar-fill { height:100%; background:linear-gradient(90deg,#7c3aed,#a78bfa); transition:width 0.4s; }
  .task-bar-fill.done { background:#22c55e; }
  .task-bar-fill.fail { background:#ef4444; }
  .task-pct { font-size:11px; color:#a78bfa; font-weight:600; min-width:36px; text-align:right; }
  .task-pct.done { color:#22c55e; }
  .task-pct.fail { color:#ef4444; }

  /* Activity panel */
  .activity-panel { position:fixed; top:120px; right:16px; width:210px; background:#0d0d1a; border:1px solid #2a2a4a; border-radius:12px; z-index:150; font-size:11px; box-shadow:0 4px 24px rgba(0,0,0,0.5); user-select:none; }
  .ap-hdr { padding:8px 12px; display:flex; justify-content:space-between; align-items:center; cursor:grab; border-bottom:1px solid #1a1a2e; border-radius:12px 12px 0 0; background:#16162a; }
  .ap-hdr:active { cursor:grabbing; }
  .ap-hdr-left { display:flex; align-items:center; gap:6px; }
  .ap-dot { width:6px; height:6px; border-radius:50%; background:#22c55e; animation:apPulse 2s infinite; }
  .ap-dot.busy { background:#a78bfa; }
  .ap-dot.err { background:#ef4444; animation:none; }
  @keyframes apPulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
  .ap-title { font-size:10px; font-weight:600; letter-spacing:0.08em; color:#7c7caa; }
  .ap-min { background:none; border:none; color:#555570; font-size:13px; cursor:pointer; padding:0 2px; line-height:1; }
  .ap-min:hover { color:#a78bfa; }
  .ap-body { padding:10px 12px; display:flex; flex-direction:column; gap:7px; }
  .ap-row { display:grid; grid-template-columns:52px 1fr; gap:4px; align-items:start; }
  .ap-label { color:#555570; font-size:10px; padding-top:1px; text-transform:uppercase; letter-spacing:0.05em; }
  .ap-val { color:#e8e8f0; font-size:11px; word-break:break-word; }
  .ap-val.model { color:#a78bfa; font-weight:600; }
  .ap-val.pool-coding { color:#34d399; }
  .ap-val.pool-creative { color:#f472b6; }
  .ap-val.pool-reasoning { color:#60a5fa; }
  .ap-val.pool-general { color:#a78bfa; }
  .ap-val.pool-design { color:#60a5fa; }
  .ap-val.pool-docs { color:#fbbf24; }
  .ap-val.pool-fast { color:#34d399; }
  .ap-val.pool-agentic { color:#f472b6; }
  .ap-val.err { color:#ef4444; font-size:10px; }
  .ap-divider { height:1px; background:#1a1a2e; }
  .ap-task-bar { height:3px; background:#1a1a2e; border-radius:2px; overflow:hidden; margin-top:3px; }
  .ap-task-fill { height:100%; background:linear-gradient(90deg,#7c3aed,#a78bfa); transition:width 0.4s; }
  .ap-minimized .ap-body { display:none; }
  .ap-minimized { border-radius:12px; }
  .ap-minimized .ap-hdr { border-radius:12px; border-bottom:none; }

  /* Power button */
  .power-btn { width:34px; height:34px; border-radius:50%; border:2px solid #22c55e; background:none; cursor:pointer; display:flex; align-items:center; justify-content:center; transition:all 0.2s; }
  .power-btn:hover { border-color:#16a34a; box-shadow:0 0 8px rgba(34,197,94,0.4); }
  .power-btn.off { border-color:#ef4444; }
  .power-btn.off:hover { box-shadow:0 0 8px rgba(239,68,68,0.4); }
  .power-icon { width:14px; height:14px; border-radius:50%; border:2px solid #22c55e; position:relative; }
  .power-icon::after { content:''; position:absolute; top:-4px; left:50%; transform:translateX(-50%); width:2px; height:6px; background:#22c55e; border-radius:1px; }
  .power-btn.off .power-icon { border-color:#ef4444; }
  .power-btn.off .power-icon::after { background:#ef4444; }

  /* Status pill */
  .status-pill { display:flex; align-items:center; gap:5px; background:#16162a; border:1px solid #2a2a4a; border-radius:20px; padding:3px 10px 3px 7px; cursor:pointer; transition:border-color 0.2s; }
  .status-pill:hover { border-color:#4f46e5; }
  .status-dot { width:7px; height:7px; border-radius:50%; flex-shrink:0; }
  .status-dot.idle    { background:#22c55e; }
  .status-dot.think   { background:#3b82f6; animation:pillPulse 1s infinite; }
  .status-dot.listen  { background:#f59e0b; animation:pillPulse 1s infinite; }
  .status-dot.act     { background:#a78bfa; animation:pillPulse 1s infinite; }
  .status-dot.error   { background:#ef4444; }
  .status-pill-label { font-size:10px; color:#7c7caa; }
  @keyframes pillPulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

  /* Activity sidebar */
  .activity-sidebar { position:fixed; top:0; right:-440px; width:420px; height:100dvh; background:#0a0a12; border-left:1px solid #1a1a2e; z-index:190; display:flex; flex-direction:column; transition:right 0.28s ease; overflow:hidden; }
  .activity-sidebar.open { right:0; }
  .activity-sidebar.open .asb-resize { display:block; }
  /* Resize handle */
  .asb-resize { display:none; position:absolute; left:0; top:0; width:5px; height:100%; cursor:ew-resize; z-index:10; background:transparent; }
  .asb-resize:hover { background:rgba(79,70,229,0.3); }
  .asb-hdr { padding:14px 16px; border-bottom:1px solid #1a1a2e; display:flex; justify-content:space-between; align-items:center; flex-shrink:0; background:#0d0d1a; }
  .asb-hdr h2 { font-size:13px; color:#a78bfa; font-weight:600; letter-spacing:0.05em; }
  .asb-close { background:none; border:none; color:#555570; font-size:16px; cursor:pointer; padding:2px 6px; }
  .asb-close:hover { color:#e8e8f0; }
  .asb-body { overflow-y:auto; padding:12px; display:flex; flex-direction:column; gap:0; flex:1; }
  .asb-body::-webkit-scrollbar { width:3px; }
  .asb-body::-webkit-scrollbar-thumb { background:#2a2a4a; border-radius:2px; }
  /* Turn blocks */
  .aturn { margin-bottom:16px; }
  .aturn-hdr { font-size:10px; color:#444460; padding:0 0 6px 2px; display:flex; align-items:center; gap:8px; border-bottom:1px solid #16162a; margin-bottom:6px; }
  .aturn-ts { color:#333350; }
  .aturn-input { color:#666680; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; max-width:240px; font-style:italic; }
  /* Action rows */
  .arow { display:grid; grid-template-columns:20px 1fr auto; gap:8px; align-items:start; padding:5px 4px; border-radius:6px; cursor:pointer; }
  .arow:hover { background:#0f0f20; }
  .arow-icon { font-size:13px; text-align:center; padding-top:1px; }
  .arow-main { display:flex; flex-direction:column; gap:2px; overflow:hidden; }
  .arow-name { font-size:12px; font-weight:600; color:#a78bfa; }
  .arow-name.tool { color:#fbbf24; }
  .arow-name.skill { color:#34d399; }
  .arow-name.llm { color:#60a5fa; }
  .arow-name.error { color:#ef4444; }
  .arow-sub { font-size:11px; color:#666680; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .arow-dur { font-size:10px; color:#333350; white-space:nowrap; padding-top:2px; }
  /* Expanded detail */
  .arow-detail { display:none; margin:4px 0 6px 28px; background:#0a0a18; border-radius:6px; padding:8px; border:1px solid #16162a; }
  .arow.expanded .arow-detail { display:block; }
  .arow-detail-lbl { font-size:10px; color:#444460; text-transform:uppercase; letter-spacing:0.05em; margin-bottom:3px; margin-top:6px; }
  .arow-detail-lbl:first-child { margin-top:0; }
  .arow-detail-val { font-size:11px; color:#b0b0c8; font-family:monospace; white-space:pre-wrap; word-break:break-all; max-height:140px; overflow-y:auto; }
  /* Activity button */
  .activity-btn { background:none; border:1px solid #2a2a4a; border-radius:8px; color:#7c7caa; font-size:11px; padding:4px 10px; cursor:pointer; }
  .activity-btn:hover { border-color:#4f46e5; color:#a78bfa; }
  .activity-btn.active { border-color:#4f46e5; color:#a78bfa; background:#16162a; }

  /* Events drawer */
  .drawer { position:fixed; top:0; right:-360px; width:340px; height:100dvh; background:#0d0d1a; border-left:1px solid #1a1a2e; z-index:200; display:flex; flex-direction:column; transition:right 0.25s ease; }
  .drawer.open { right:0; }
  .drawer-hdr { padding:14px 16px; border-bottom:1px solid #1a1a2e; display:flex; justify-content:space-between; align-items:center; flex-shrink:0; }
  .drawer-hdr h2 { font-size:13px; color:#a78bfa; font-weight:600; letter-spacing:0.05em; }
  .drawer-close { background:none; border:none; color:#555570; font-size:16px; cursor:pointer; padding:2px 6px; }
  .drawer-close:hover { color:#e8e8f0; }
  .drawer-body { overflow-y:auto; padding:10px; display:flex; flex-direction:column; gap:6px; flex:1; }
  .drawer-body::-webkit-scrollbar { width:0; }

  /* Log rows */
  .log-row { background:#16162a; border:1px solid #1e1e3a; border-radius:8px; padding:8px 12px; display:grid; grid-template-columns:42px 1fr auto; gap:6px; align-items:start; }
  .log-dot { width:8px; height:8px; border-radius:50%; margin-top:3px; flex-shrink:0; }
  .log-dot.ok   { background:#22c55e; }
  .log-dot.slow { background:#f59e0b; }
  .log-dot.error{ background:#ef4444; }
  .log-dot.warn { background:#f59e0b; }
  .log-time { font-size:10px; color:#555570; margin-top:1px; }
  .log-msg  { font-size:12px; color:#e8e8f0; margin-bottom:3px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .log-meta { font-size:10px; color:#7c7caa; display:flex; gap:4px; flex-wrap:wrap; }
  .log-secs { font-size:11px; font-weight:600; text-align:right; white-space:nowrap; }
  .log-secs.ok   { color:#22c55e; }
  .log-secs.slow { color:#f59e0b; }
  .log-secs.error{ color:#ef4444; }
  .log-err  { font-size:10px; color:#ef4444; margin-top:3px; word-break:break-all; }
</style>
</head>
<body>

<!-- Activity sidebar -->
<div class="activity-sidebar" id="activity-sidebar">
  <div class="asb-resize" id="asb-resize"></div>
  <div class="asb-hdr">
    <h2>TRUMAN ACTIVITY</h2>
    <button class="asb-close" onclick="closeActivity()">✕</button>
  </div>
  <div class="asb-body" id="activity-body">
    <div id="activity-placeholder" style="color:#444460;padding:24px;text-align:center;font-size:12px">no activity yet — send a message</div>
  </div>
</div>

<!-- Events drawer -->
<div class="drawer" id="events-drawer">
  <div class="drawer-hdr">
    <h2>EVENTS</h2>
    <button class="drawer-close" onclick="closeDrawer()">✕</button>
  </div>
  <div class="drawer-body" id="drawer-body">
    <div style="color:#555570;padding:20px;text-align:center;font-size:12px">no events yet</div>
  </div>
</div>

<div class="header">
  <h1>TRUMAN</h1>
  <div style="display:flex;align-items:center;gap:8px;">
    <div class="status-pill" id="status-pill" onclick="toggleDrawer()" title="click to see events">
      <div class="status-dot idle" id="status-dot"></div>
      <span class="status-pill-label" id="status-label">idle</span>
    </div>
    <span id="pool-badge" style="font-size:10px;color:#7c7caa;background:#16162a;border:1px solid #2a2a4a;border-radius:6px;padding:2px 8px;display:none;"></span>
    <button class="activity-btn" id="activity-btn" onclick="toggleActivity()" title="Truman's brain activity">activity</button>
    <button class="hdr-btn" onclick="newSession()">+ new</button>
    <button class="hdr-btn" onclick="clearChat()">clear</button>
    <span style="font-size:11px;color:#555570;" id="mac-status">mac offline</span>
    <div class="mac-dot" id="mac-dot"></div>
    <button class="power-btn" id="power-btn" onclick="togglePower()" title="Kill switch — Om only">
      <div class="power-icon"></div>
    </button>
  </div>
</div>

<div class="session-bar" id="session-bar"></div>
<div class="tasks-strip" id="tasks-strip"></div>

<div class="messages" id="messages">
  <div class="msg truman">
    <div class="bubble">yo. what's up?</div>
  </div>
</div>

<div class="input-area">
  <textarea id="input" placeholder="say something..." rows="1"></textarea>
  <input type="file" id="file-input" style="display:none" accept=".py,.js,.ts,.html,.css,.json,.md,.txt,.csv,.xml,.yaml,.yml,.sh,.pdf,.docx,.xlsx,.pptx,.png,.jpg,.jpeg,.gif,.webp,.bmp,image/*">
  <button class="btn voice-btn" id="upload-btn" title="upload file" onclick="document.getElementById('file-input').click()">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/>
    </svg>
  </button>
  <button class="btn voice-btn" id="voice-btn" title="tap to talk">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
      <path d="M19 10v2a7 7 0 0 1-14 0v-2M12 19v4M8 23h8"/>
    </svg>
  </button>
  <button class="btn send-btn" id="send-btn">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5">
      <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
    </svg>
  </button>
</div>

<script>
const messages   = document.getElementById('messages');
const input      = document.getElementById('input');
const sendBtn    = document.getElementById('send-btn');
const voiceBtn   = document.getElementById('voice-btn');
const macDot     = document.getElementById('mac-dot');
const macStatus  = document.getElementById('mac-status');
const sessionBar = document.getElementById('session-bar');

// ── Power / kill switch ──────────────────────────────────────────────────────
const powerBtn = document.getElementById('power-btn');
let trumanOn = true;

async function fetchPowerState() {
  try {
    const r = await fetch('/api/power');
    const d = await r.json();
    trumanOn = d.on;
    updatePowerUI();
  } catch(e) {}
}

function updatePowerUI() {
  if (trumanOn) {
    powerBtn.classList.remove('off');
    powerBtn.title = 'Truman is ON — click to kill';
    powerBtn.querySelector('.power-icon').style.borderColor = '#22c55e';
    powerBtn.querySelector('.power-icon').style.setProperty('--after-bg', '#22c55e');
  } else {
    powerBtn.classList.add('off');
    powerBtn.title = 'Truman is OFF — click to turn on';
  }
}

async function togglePower() {
  try {
    const r = await fetch('/api/power', {method:'POST'});
    const d = await r.json();
    trumanOn = d.on;
    updatePowerUI();
    if (!trumanOn) {
      addMsg('truman', "i'm off. om turned me off.", {});
    } else {
      addMsg('truman', "i'm back.", {});
    }
  } catch(e) {}
}

fetchPowerState();

// ── Live background tasks (repo ingests, etc) ───────────────────────────────
const tasksStrip = document.getElementById('tasks-strip');
let lastTaskState = {};   // name → status, for detecting transitions
let tasksPollTimer = null;

async function pollTasks() {
  try {
    const r = await fetch('/api/tasks');
    const d = await r.json();
    const tasks = d.tasks || [];
    renderTasks(tasks);

    // detect just-completed tasks → push a chat confirmation
    tasks.forEach(t => {
      const prev = lastTaskState[t.name];
      if (prev && prev !== 'done' && t.status === 'done') {
        addMsg('truman', `done — ingested ${t.files} files from ${t.name}. ask me anything about it.`, {});
      }
      if (prev && prev !== 'failed' && t.status === 'failed') {
        addMsg('truman', `couldn't ingest ${t.name}: ${t.error || 'unknown error'}`, {});
      }
      lastTaskState[t.name] = t.status;
      // update activity panel with active task
      if (typeof updateActivityPanel !== 'undefined') {
        if (t.status === 'cloning' || t.status === 'ingesting') {
          updateActivityPanel({ task: t });
        } else if (t.status === 'done' || t.status === 'failed') {
          updateActivityPanel({ task: t });
        }
      }
    });
    // clean up state for tasks that fell out of the active window
    const live = new Set(tasks.map(t => t.name));
    Object.keys(lastTaskState).forEach(n => { if (!live.has(n)) delete lastTaskState[n]; });
  } catch(e) {}
}

function renderTasks(tasks) {
  if (!tasks.length) {
    tasksStrip.classList.remove('visible');
    tasksStrip.innerHTML = '';
    return;
  }
  tasksStrip.classList.add('visible');
  tasksStrip.innerHTML = tasks.map(t => {
    const pct = t.total > 0 ? Math.min(100, Math.round((t.progress / t.total) * 100)) : (t.status === 'done' ? 100 : 0);
    const cls = t.status === 'done' ? 'done' : (t.status === 'failed' ? 'fail' : 'run');
    const icon = t.status === 'done' ? '✓' : (t.status === 'failed' ? '✕' : '◐');
    const stage = t.status === 'done'
        ? `done · ${t.files} files`
        : (t.status === 'failed' ? (t.error || 'failed') : `${t.stage || 'working'} · ${t.progress}/${t.total || '?'}`);
    return `
      <div class="task-row">
        <div class="task-icon ${cls}">${icon}</div>
        <div class="task-info">
          <div class="task-title">★ ${t.kind}: ${t.name}</div>
          <div class="task-stage">${stage}</div>
          <div class="task-bar"><div class="task-bar-fill ${cls === 'fail' ? 'fail' : (cls === 'done' ? 'done' : '')}" style="width:${pct}%"></div></div>
        </div>
        <div class="task-pct ${cls}">${pct}%</div>
      </div>
    `;
  }).join('');
}

// poll every 2s — cheap, only hits SQLite
function startTasksPoll() {
  if (tasksPollTimer) return;
  pollTasks();
  tasksPollTimer = setInterval(pollTasks, 2000);
}
startTasksPoll();

(function connectSSE() {
  const es = new EventSource('/api/stream');
  es.onmessage = (e) => {
    try {
      const d = JSON.parse(e.data);
      if (d.type === 'connected') return;
      if (d.kind === 'toast') { showToast(d.message); return; }
      if (d.kind === 'trace') { if (window._sseTraceHandler) window._sseTraceHandler(d); return; }
      if (d.message) addMsg('truman', d.message, {});
    } catch(_) {}
  };
  es.onerror = () => {
    es.close();
    setTimeout(connectSSE, 5000);   // reconnect after 5s on error
  };
})();

// ── Session management ──────────────────────────────────────────────────────
function genId() { return 'sess-' + Date.now() + '-' + Math.random().toString(36).slice(2,7); }

const _LS_KEY = 'truman_sessions_v1';
const _LS_CUR = 'truman_current_v1';
const _MSG_CAP = 60000; // cap per session to stay well under 5MB localStorage limit

function _saveSessions() {
  try {
    const slim = sessions.map(s => ({
      id: s.id, label: s.label,
      msgs: (s.msgs || '').slice(-_MSG_CAP)  // keep last 60k chars
    }));
    localStorage.setItem(_LS_KEY, JSON.stringify(slim));
    localStorage.setItem(_LS_CUR, String(currentSession));
  } catch(e) {}
}

function _loadSessions() {
  try {
    const raw = localStorage.getItem(_LS_KEY);
    if (!raw) return null;
    const parsed = JSON.parse(raw);
    if (!Array.isArray(parsed) || !parsed.length) return null;
    return parsed;
  } catch(e) { return null; }
}

// restore from localStorage or start fresh
const _stored = _loadSessions();
let sessions = _stored || [{id: genId(), label: 'chat 1', msgs: ''}];
let currentSession = Math.min(parseInt(localStorage.getItem(_LS_CUR) || '0'), sessions.length - 1);

function currentSessionId() { return sessions[currentSession].id; }

function renderSessionBar() {
  sessionBar.innerHTML = '';
  sessions.forEach((s, i) => {
    const tab = document.createElement('div');
    tab.className = 'session-tab' + (i === currentSession ? ' active' : '');
    tab.textContent = s.label;
    tab.onclick = () => switchSession(i);
    sessionBar.appendChild(tab);
  });
}

async function switchSession(i) {
  sessions[currentSession].msgs = messages.innerHTML;
  currentSession = i;
  if (sessions[i].msgs) {
    messages.innerHTML = sessions[i].msgs;
  } else {
    messages.innerHTML = '<div class="msg truman"><div class="bubble">yo. what\'s up?</div></div>';
    // try loading from SQLite for this session
    await loadHistory(sessions[i].id);
  }
  renderSessionBar();
  _saveSessions();
}

function newSession() {
  sessions[currentSession].msgs = messages.innerHTML;
  const n = sessions.length + 1;
  sessions.push({id: genId(), label: `chat ${n}`, msgs: ''});
  currentSession = sessions.length - 1;
  messages.innerHTML = '<div class="msg truman"><div class="bubble">yo. what\'s up?</div></div>';
  renderSessionBar();
  _saveSessions();
}

function clearChat() {
  messages.innerHTML = '<div class="msg truman"><div class="bubble">yo. what\'s up?</div></div>';
  sessions[currentSession].msgs = '';
  _saveSessions();
}

renderSessionBar();

// restore active session's messages on page load
if (_stored && sessions[currentSession].msgs) {

}

function addMsg(role, text, meta) {
  const div = document.createElement('div');
  div.className = 'msg ' + role;

  const bubble = document.createElement('div');
  bubble.className = 'bubble';
  bubble.innerHTML = text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n\n/g,'<br><br>').replace(/\n/g,' ');
  div.appendChild(bubble);

  if (meta) {
    const m = document.createElement('div');
    m.className = 'meta';
    if (meta.model && meta.model !== 'none') {
      const b = document.createElement('span');
      b.className = 'badge';
      b.textContent = meta.model.split('/').pop().replace(':free','');
      m.appendChild(b);
    }
    if (meta.pool) {
      const b = document.createElement('span');
      b.className = 'badge pool-' + meta.pool;
      b.textContent = meta.pool;
      m.appendChild(b);
    }
    if (meta.tool_calls && meta.tool_calls.length) {
      meta.tool_calls.forEach(tc => {
        const b = document.createElement('span');
        b.className = 'badge tool';
        b.textContent = '⚙ ' + (tc.name || tc);
        m.appendChild(b);
      });
    }
    div.appendChild(m);
  }

  messages.appendChild(div);
  messages.scrollTop = messages.scrollHeight;
  return div;
}

const statusPhrases = [
  'thinking...', 'on it...', 'processing...', 'working on it...'
];
const toolPhrases = {
  web_search: 'searching the web...', get_weather: 'checking weather...',
  remember: 'saving to memory...', recall: 'checking memory...',
  search_history: 'digging through history...', recent_conversations: 'pulling past conversations...',
  read_mac_file: 'reading your file...', list_mac_dir: 'browsing your folders...',
  search_mac_files: 'searching your mac...', write_mac_file: 'saving to your mac...',
  set_reminder: 'setting reminder...', list_reminders: 'checking reminders...',
};

function addStatus() {
  const div = document.createElement('div');
  div.className = 'status-line';
  div.innerHTML = '<div class="bar"></div><span class="status-text">thinking...</span>';
  messages.appendChild(div);
  messages.scrollTop = messages.scrollHeight;

  let i = 0;
  const span = div.querySelector('.status-text');
  const interval = setInterval(() => {
    i = (i + 1) % statusPhrases.length;
    span.textContent = statusPhrases[i];
  }, 1800);
  div._interval = interval;
  div.setTool = (tool) => { span.textContent = toolPhrases[tool] || tool + '...'; };
  div.remove = () => { clearInterval(interval); div.parentNode && div.parentNode.removeChild(div); };
  return div;
}

async function send() {
  const text = input.value.trim();
  if (!text) return;
  input.value = '';
  input.style.height = 'auto';

  let displayText = text;
  let sendText = text;
  let sendPool = null;

  // if a file is pending, show card/image in chat and send content to backend
  if (_pendingFile) {
    if (_pendingFile.isImage) {
      addImageMsg(_pendingFile.file);
      sendText = `[Image: ${_pendingFile.filename}]\n\n${_pendingFile.text}`;
      sendPool = 'vision';
      displayText = null; // image already added above
    } else {
      displayText = `📎 ${_pendingFile.filename}`;
      sendText = `[File: ${_pendingFile.filename}]\n\n${_pendingFile.text}`;
      sendPool = 'docs';
    }
    _pendingFile = null;
  }

  if (displayText) addMsg('user', displayText, null);
  setStatus('think', 'thinking...');
  const status = addStatus();

  // animate tool names while waiting
  const toolCycle = ['web_search','recall','search_history','remember'];
  let ti = 0;
  const toolInterval = setInterval(() => { status.setTool(toolCycle[ti++ % toolCycle.length]); }, 3000);

  try {
    const r = await fetch('/api/chat', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({message: sendText, session_id: currentSessionId(), ...(sendPool && {pool: sendPool})})
    });
    const d = await r.json();
    clearInterval(toolInterval);
    status.remove();
    if (d.error) {
      setStatus('error', 'error');
      addMsg('truman', 'error: ' + d.error, null);
      setTimeout(() => setStatus('idle','idle'), 4000);
      return;
    }
    const respText = (d.response || '').trim();
    if (!respText) { setStatus('idle','idle'); addMsg('truman', '(no response — try again)', null); return; }
    addMsg('truman', respText, {model: d.model || 'deepseek-v3.2', pool: d.pool || 'general', tool_calls: d.tool_calls});
    updatePanelFromResponse(d, sendText || text, respText);
    sessions[currentSession].msgs = messages.innerHTML;
    _saveSessions();
    setStatus('idle', 'idle');
    // update mac dot + pool badge
    macDot.className = 'mac-dot' + (d.mac === 'connected' ? ' on' : '');
    macStatus.textContent = d.mac === 'connected' ? 'mac online' : 'mac offline';
    const pb = document.getElementById('pool-badge');
    if (d.pool) { pb.textContent = d.pool; pb.style.display = 'inline'; }
    if (drawerOpen) refreshDrawer();
  } catch(e) {
    clearInterval(toolInterval);
    status.remove();
    setStatus('error', 'error');
    setTimeout(() => setStatus('idle','idle'), 4000);
    console.error('[Truman] fetch error:', e);
    addMsg('truman', 'server error — check the terminal', null);
  }
}

// ── Voice — /audio WebSocket → OpenAI Realtime (ash voice) ────────────────
let audioWs = null, audioCtx = null, micStream = null, processor = null;
let isVoiceActive = false;
let reconnecting = false;

// How far ahead to schedule audio — bigger = fewer gaps on variable-latency Railway proxy
const PLAYBACK_BUFFER_SEC = 0.20;  // 200ms jitter buffer

async function startVoice() {
  if (isVoiceActive || reconnecting) return;
  try {
    // Let AudioContext pick native sample rate (Safari iOS may not support forced 48kHz)
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    await audioCtx.resume();
    const nativeRate = audioCtx.sampleRate;  // e.g. 48000 on Chrome, 44100 on some Safari
    const downsampleRatio = nativeRate / 24000;  // exact ratio for correct pitch

    micStream = await navigator.mediaDevices.getUserMedia({
      audio: { echoCancellation: true, noiseSuppression: true, sampleRate: nativeRate }
    });
    const wsUrl = (location.protocol==='https:'?'wss':'ws') + '://' + location.host + '/audio';
    audioWs = new WebSocket(wsUrl);
    audioWs.binaryType = 'arraybuffer';

    audioWs.onopen = () => {
      isVoiceActive = true;
      voiceBtn.classList.add('listening');
      voiceBtn.title = 'tap to disconnect';
      setStatus('listen', 'listening');
      const src = audioCtx.createMediaStreamSource(micStream);
      // 4096 frames @ native rate → chunk every ~85ms — good balance of latency vs CPU
      processor = audioCtx.createScriptProcessor(4096, 1, 1);
      processor.onaudioprocess = ev => {
        if (!audioWs || audioWs.readyState !== 1) return;
        const f32 = ev.inputBuffer.getChannelData(0);
        // Downsample to 24kHz using 2-tap average (anti-aliasing) instead of naive skip
        const outLen = Math.floor(f32.length / downsampleRatio);
        const out = new Int16Array(outLen);
        const step = downsampleRatio;
        for (let i = 0; i < outLen; i++) {
          const pos = i * step;
          const lo = Math.floor(pos), hi = Math.min(lo + 1, f32.length - 1);
          const frac = pos - lo;
          const sample = f32[lo] * (1 - frac) + f32[hi] * frac;  // linear interpolation
          out[i] = Math.max(-32768, Math.min(32767, sample * 32768));
        }
        audioWs.send(out.buffer);
      };
      src.connect(processor); processor.connect(audioCtx.destination);
    };

    // Playback: schedule ahead by PLAYBACK_BUFFER_SEC to absorb Railway jitter
    let nextPlay = 0;
    audioWs.onmessage = e => {
      if (typeof e.data === 'string') {
        try {
          const m = JSON.parse(e.data);
          if (m.type === 'flush') nextPlay = 0;
          if (m.type === 'evicted') { stopVoice(); return; }
          if (m.type === 'transcript') {
            // Voice turn completed — show in chat just like text chat
            const role = m.role === 'user' ? 'user' : 'truman';
            addMsg(role, m.text, role === 'truman' ? {model: 'realtime/ash', pool: 'voice'} : null);
          }
        } catch(err) {}
        return;
      }
      const i16 = new Int16Array(e.data);
      const f32 = new Float32Array(i16.length);
      for (let i = 0; i < i16.length; i++) f32[i] = i16[i] / 32768;
      const buf = audioCtx.createBuffer(1, f32.length, 24000);
      buf.copyToChannel(f32, 0);
      const node = audioCtx.createBufferSource();
      node.buffer = buf;
      node.connect(audioCtx.destination);
      const now = audioCtx.currentTime;
      // Reset ahead of now if we've fallen behind (e.g. after flush or long gap)
      if (nextPlay < now + 0.01) nextPlay = now + PLAYBACK_BUFFER_SEC;
      node.start(nextPlay);
      nextPlay += buf.duration;
    };

    audioWs.onerror = () => {
      // onclose will fire right after — let it handle reconnect
    };
    audioWs.onclose = () => {
      if (!isVoiceActive) return;  // already cleaned up (user tapped stop)
      stopVoice();
      // Reconnect after brief delay — give Railway time to release the old socket
      reconnecting = true;
      setTimeout(() => { reconnecting = false; startVoice(); }, 2000);
    };

  } catch(e) {
    console.error('voice error', e);
    stopVoice();
  }
}

function stopVoice() {
  isVoiceActive = false;
  reconnecting = false;
  voiceBtn.classList.remove('listening');
  setStatus('idle', 'idle');
  voiceBtn.title = 'tap to talk';
  if (processor) { try { processor.disconnect(); } catch(e) {} processor = null; }
  if (micStream) { micStream.getTracks().forEach(t => t.stop()); micStream = null; }
  if (audioWs && audioWs.readyState < 2) { try { audioWs.close(); } catch(e) {} }
  audioWs = null;
  if (audioCtx) { try { audioCtx.close(); } catch(e) {} audioCtx = null; }
}

voiceBtn.addEventListener('click', () => { isVoiceActive ? stopVoice() : startVoice(); });

// ── Events drawer ────────────────────────────────────────────────────────────
let drawerOpen = false;
let drawerPoll = null;

function toggleDrawer() { drawerOpen ? closeDrawer() : openDrawer(); }

function openDrawer() {
  drawerOpen = true;
  document.getElementById('events-drawer').classList.add('open');
  refreshDrawer();
  drawerPoll = setInterval(refreshDrawer, 3000);
}

  drawerOpen = false;

async function refreshDrawer() {
  const body = document.getElementById('drawer-body');
  try {
    // try DB events first, fall back to in-memory log
    let events = [];
    try {
      const r = await fetch('/api/events');
      const d = await r.json();
      events = d.events || [];
    } catch(_) {
      const r = await fetch('/api/logs');
      const d = await r.json();
      events = (d.logs || []).map(l => ({
        ts: l.ts, kind:'chat', status:l.status, pool:l.pool,
        model:l.model, elapsed_ms: Math.round(l.secs*1000),
        detail: JSON.stringify({msg:l.msg, tools:l.tools}), error:l.error
      }));
    }
    if (!events.length) {
      body.innerHTML = '<div style="color:#555570;padding:20px;text-align:center;font-size:12px">no events yet</div>';
      return;
    }
    body.innerHTML = '';
    events.forEach(e => {
      let detail = {};
      try { detail = JSON.parse(e.detail || '{}'); } catch(_) {}
      const msg   = detail.msg || e.kind || '';
      const tools = (detail.tools || []).map(t => {
        const isSkill = t.includes('.');
        return `<span class="badge tool" style="${isSkill ? 'color:#a78bfa;border-color:#3a1e5f' : ''}">${isSkill ? '★' : '⚙'} ${t}</span>`;
      }).join('');
      const secs  = e.elapsed_ms ? (e.elapsed_ms/1000).toFixed(1)+'s' : '';
      const tsShort = (e.ts||'').split('T').pop().split('.')[0] || e.ts || '';
      const errHtml = e.error ? `<div class="log-err">${e.error}</div>` : '';
      const modelBadge = e.model ? `<span class="badge">${e.model}</span>` : '';
      const poolBadge  = e.pool  ? `<span class="badge pool-${e.pool}">${e.pool}</span>` : '';
      const kindBadge  = `<span class="badge">${e.kind||''}</span>`;
      const row = document.createElement('div');
      row.className = 'log-row';
      row.innerHTML = `
        <div style="display:flex;flex-direction:column;align-items:center;gap:3px">
          <div class="log-dot ${e.status||'ok'}"></div>
          <div class="log-time">${tsShort}</div>
        </div>
        <div>
          <div class="log-msg">${msg}</div>
          <div class="log-meta">${kindBadge}${modelBadge}${poolBadge}${tools}</div>
          ${errHtml}
        </div>
        <div class="log-secs ${e.status||'ok'}">${secs}</div>
      `;
      body.appendChild(row);
    });
  } catch(err) {
    body.innerHTML = '<div style="color:#ef4444;padding:20px;font-size:12px">failed to load events</div>';
  }
}

// ── Activity panel ────────────────────────────────────────────────────────────
let apPanel, apHandle;
let apDragging = false, apDX = 0, apDY = 0;

document.addEventListener('DOMContentLoaded', () => {
  apPanel  = document.getElementById('activity-panel');
  apHandle = document.getElementById('ap-drag-handle');
  if (!apPanel || !apHandle) return;

  apHandle.addEventListener('mousedown', e => {
    apDragging = true;
    apDX = e.clientX - apPanel.getBoundingClientRect().left;
    apDY = e.clientY - apPanel.getBoundingClientRect().top;
    e.preventDefault();
  });
  document.addEventListener('mousemove', e => {
    if (!apDragging) return;
    apPanel.style.left  = (e.clientX - apDX) + 'px';
    apPanel.style.top   = (e.clientY - apDY) + 'px';
    apPanel.style.right = 'auto';
  });
  document.addEventListener('mouseup', () => { apDragging = false; });

  apHandle.addEventListener('touchstart', e => {
    const t = e.touches[0];
    apDragging = true;
    apDX = t.clientX - apPanel.getBoundingClientRect().left;
    apDY = t.clientY - apPanel.getBoundingClientRect().top;
  });
  document.addEventListener('touchmove', e => {
    if (!apDragging) return;
    const t = e.touches[0];
    apPanel.style.left  = (t.clientX - apDX) + 'px';
    apPanel.style.top   = (t.clientY - apDY) + 'px';
    apPanel.style.right = 'auto';
  });
  document.addEventListener('touchend', () => { apDragging = false; });
});

function toggleActivityPanel() {
  if (!apPanel) apPanel = document.getElementById('activity-panel');
  apPanel.classList.toggle('ap-minimized');
  document.getElementById('ap-min-btn').textContent = apPanel.classList.contains('ap-minimized') ? '□' : '−';
}

function updateActivityPanel({ model, pool, inputChars, outputChars, error, task }) {
  if (model) {
    document.getElementById('ap-model').textContent = model;
    document.getElementById('ap-model').className   = 'ap-val model';
  }
  if (pool) {
    const pe = document.getElementById('ap-pool');
    pe.textContent = pool;
    const knownPools = ['coding','creative','design','docs','vision','general','reasoning','fast','agentic'];
    const poolKey = knownPools.find(p => pool.includes(p));
    pe.className = 'ap-val ' + (poolKey ? 'pool-' + poolKey : 'model');
    document.getElementById('ap-status-dot').className = 'ap-dot';
  }
  if (inputChars !== undefined || outputChars !== undefined) {
    const inTok  = Math.round((inputChars  || 0) / 4);
    const outTok = Math.round((outputChars || 0) / 4);
    document.getElementById('ap-tokens').textContent = `~${(inTok/1000).toFixed(1)}k in / ${outTok} out`;
  }
  if (error) {
    const row = document.getElementById('ap-error-row');
    row.style.display = 'grid';
    document.getElementById('ap-error').textContent = error.slice(0,80);
    document.getElementById('ap-status-dot').className = 'ap-dot err';
  } else if (error === null) {
    document.getElementById('ap-error-row').style.display = 'none';
    document.getElementById('ap-status-dot').className = 'ap-dot';
  }
  if (task) {
    const row = document.getElementById('ap-task-row');
    row.style.display = 'grid';
    document.getElementById('ap-task-name').textContent = task.name;
    document.getElementById('ap-task-stage').textContent = task.stage || task.status;
    const pct = task.total > 0 ? Math.round(task.progress / task.total * 100) : 0;
    document.getElementById('ap-task-fill').style.width = pct + '%';
    document.getElementById('ap-status-dot').className = 'ap-dot busy';
    if (task.status === 'done' || task.status === 'failed') {
      setTimeout(() => {
        row.style.display = 'none';
        document.getElementById('ap-status-dot').className = 'ap-dot';
      }, 5000);
    }
  }
}

// Hook into addMsg to update panel on truman responses
const _origAddMsg = addMsg;
// update from API response metadata captured in sendMsg
function updatePanelFromResponse(d, userMsg, respText) {
  const poolDisplay = d.skill ? ('★ ' + d.skill) : (d.pool || null);
  updateActivityPanel({
    model:       d.model || null,
    pool:        poolDisplay,
    inputChars:  (userMsg || '').length + 6000,
    outputChars: (respText || '').length,
    error:       d.error || null,
  });
}


</script>

<!-- Activity panel -->
<div class="activity-panel" id="activity-panel">
  <div class="ap-hdr" id="ap-drag-handle">
    <div class="ap-hdr-left">
      <div class="ap-dot" id="ap-status-dot"></div>
      <span class="ap-title">LIVE</span>
    </div>
    <button class="ap-min" id="ap-min-btn" onclick="toggleActivityPanel()">−</button>
  </div>
  <div class="ap-body">
    <div class="ap-row">
      <span class="ap-label">MODEL</span>
      <span class="ap-val model" id="ap-model">—</span>
    </div>
    <div class="ap-row">
      <span class="ap-label">POOL</span>
      <span class="ap-val" id="ap-pool">—</span>
    </div>
    <div class="ap-row">
      <span class="ap-label">TOKENS</span>
      <span class="ap-val" id="ap-tokens">—</span>
    </div>
    <div class="ap-divider"></div>
    <div class="ap-row" id="ap-task-row" style="display:none">
      <span class="ap-label">TASK</span>
      <div style="display:flex;flex-direction:column;gap:2px;">
        <span class="ap-val" id="ap-task-name">—</span>
        <span style="font-size:9px;color:#7c7caa;" id="ap-task-stage"></span>
        <div class="ap-task-bar"><div class="ap-task-fill" id="ap-task-fill" style="width:0%"></div></div>
      </div>
    </div>
    <div class="ap-row" id="ap-error-row" style="display:none">
      <span class="ap-label">ERR</span>
      <span class="ap-val err" id="ap-error">—</span>
    </div>
  </div>
</div>


<script>
// ── Activity Sidebar ──────────────────────────────────────────────────────────
// Only show meaningful events: tool calls, skill runs, LLM calls, errors
const _VISIBLE_NODES = new Set(['execute_tool', 'route_skill', 'call_llm']);
let activityOpen = false;
const _traceTurns = {};   // turn_id → { ts, input, rows: [] }
const _turnOrder  = [];   // ordered list of turn_ids

function toggleActivity() { activityOpen ? closeActivity() : openActivity(); }

async function openActivity() {
  activityOpen = true;
  document.getElementById('activity-sidebar').classList.add('open');
  document.getElementById('activity-btn').classList.add('active');
  try {
    const r = await fetch('/api/trace?limit=300');
    const rows = await r.json();
    if (Array.isArray(rows)) rows.forEach(row => _ingestRow(row));
    _renderAll();
  } catch(e) { console.error('[Activity] load error:', e); }
}

function closeActivity() {
  activityOpen = false;
  document.getElementById('activity-sidebar').classList.remove('open');
  document.getElementById('activity-btn').classList.remove('active');
}

// ── Resize handle ─────────────────────────────────────────────────────────────
(function initResize() {
  const handle  = document.getElementById('asb-resize');
  const sidebar = document.getElementById('activity-sidebar');
  if (!handle || !sidebar) return;
  let dragging = false, startX = 0, startW = 0;

  function applyWidth(w) {
    w = Math.max(280, Math.min(700, w));
    sidebar.style.width = w + 'px';
  }

  handle.addEventListener('mousedown', e => {
    dragging = true;
    startX = e.clientX;
    startW = sidebar.offsetWidth;
    document.body.style.userSelect = 'none';
    e.preventDefault();
  });
  document.addEventListener('mousemove', e => {
    if (!dragging) return;
    applyWidth(startW + (startX - e.clientX));  // drag left = wider
  });
  document.addEventListener('mouseup', () => {
    if (dragging) { dragging = false; document.body.style.userSelect = ''; }
  });
})();

// ── Data ingestion ─────────────────────────────────────────────────────────────
function _ingestRow(row) {
  const tid = row.turn_id || 'unknown';

  if (!_traceTurns[tid]) {
    _traceTurns[tid] = { ts: row.ts, input: '', rows: [] };
    _turnOrder.push(tid);
  }
  // capture user input from classify_mood start
  if (row.node === 'classify_mood' && row.status === 'start') {
    _traceTurns[tid].ts    = row.ts;
    _traceTurns[tid].input = (row.summary || '').replace(/^"(.*)"$/, '$1');
  }

  const isVisible = _VISIBLE_NODES.has(row.node);
  const isError   = row.status === 'error';
  const isEnd     = row.status === 'end' && !(row.summary || '').startsWith('skipped');
  if ((!isVisible && !isError) || (!isEnd && !isError)) return;

  const already = _traceTurns[tid].rows.some(r => r.id && r.id === row.id);
  if (!already) _traceTurns[tid].rows.push(row);
}

// ── Row metadata helpers ──────────────────────────────────────────────────────
function _rowMeta(ev) {
  if (ev.status === 'error')    return { icon: '✕', cls: 'error', label: ev.node };
  if (ev.node === 'execute_tool') {
    let name = 'tool';
    try { name = JSON.parse(ev.args_json || '{}').tool_name || 'tool'; } catch(_) {}
    return { icon: '⚙', cls: 'tool', label: name };
  }
  if (ev.node === 'route_skill') {
    let name = 'skill';
    try { name = JSON.parse(ev.args_json || '{}').skill_name || 'skill'; } catch(_) {}
    return { icon: '★', cls: 'skill', label: name };
  }
  if (ev.node === 'call_llm') {
    let pool = 'llm';
    try { pool = JSON.parse(ev.args_json || '{}').pool || 'llm'; } catch(_) {}
    return { icon: '◈', cls: 'llm', label: pool };
  }
  return { icon: '●', cls: '', label: ev.node };
}

function _rowSub(ev) {
  try {
    if (ev.result_json) {
      const r = JSON.parse(ev.result_json);
      const s = typeof r === 'string' ? r : JSON.stringify(r);
      return s.slice(0, 70) + (s.length > 70 ? '…' : '');
    }
  } catch(_) {}
  return ev.summary || '';
}

// ── Build DOM ─────────────────────────────────────────────────────────────────
function _renderAll() {
  const body = document.getElementById('activity-body');
  body.innerHTML = '';
  if (_turnOrder.length === 0) {
    body.innerHTML = '<div id="activity-placeholder" style="color:#444460;padding:24px;text-align:center;font-size:12px">no activity yet — send a message</div>';
    return;
  }
  _turnOrder.forEach(tid => {
    const block = _buildTurnBlock(tid);
    if (block) body.appendChild(block);
  });
  body.scrollTop = body.scrollHeight;
}

function _buildTurnBlock(tid) {
  const turn = _traceTurns[tid];
  if (!turn || turn.rows.length === 0) return null;

  const wrap = document.createElement('div');
  wrap.className = 'aturn';
  wrap.id = 'aturn-' + tid;

  const ts  = turn.ts ? new Date(turn.ts * 1000).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}) : '';
  const inp = (turn.input || tid).slice(0, 48);
  wrap.innerHTML = `<div class="aturn-hdr"><span class="aturn-ts">${ts}</span><span class="aturn-input">"${inp}"</span></div>`;

  turn.rows.forEach((ev, i) => wrap.appendChild(_buildActionRow(ev, tid + '-' + i)));
  return wrap;
}

function _buildActionRow(ev, rowId) {
  const meta = _rowMeta(ev);
  const sub  = _rowSub(ev);
  const dur  = ev.duration_ms != null ? ev.duration_ms + 'ms' : '';

  let detailHtml = '';
  if (ev.args_json) {
    try {
      detailHtml += `<div class="arow-detail-lbl">args</div><div class="arow-detail-val">${JSON.stringify(JSON.parse(ev.args_json), null, 2)}</div>`;
    } catch(_) { detailHtml += `<div class="arow-detail-lbl">args</div><div class="arow-detail-val">${ev.args_json}</div>`; }
  }
  if (ev.result_json) {
    try {
      const r = JSON.parse(ev.result_json);
      const s = typeof r === 'string' ? r : JSON.stringify(r, null, 2);
      detailHtml += `<div class="arow-detail-lbl">result</div><div class="arow-detail-val">${s}</div>`;
    } catch(_) { detailHtml += `<div class="arow-detail-lbl">result</div><div class="arow-detail-val">${ev.result_json}</div>`; }
  }
  const hasDetail = !!detailHtml;

  const row = document.createElement('div');
  row.className = 'arow';
  row.id = 'arow-' + rowId;
  row.innerHTML = `
    <span class="arow-icon">${meta.icon}</span>
    <div class="arow-main">
      <span class="arow-name ${meta.cls}">${meta.label}</span>
      ${sub ? `<span class="arow-sub">${sub}</span>` : ''}
      ${hasDetail ? `<div class="arow-detail">${detailHtml}</div>` : ''}
    </div>
    <span class="arow-dur">${dur}</span>`;
  if (hasDetail) {
    row.style.cursor = 'pointer';
    row.addEventListener('click', () => row.classList.toggle('expanded'));
  }
  return row;
}

// ── Live SSE push ─────────────────────────────────────────────────────────────
window._sseTraceHandler = function(data) {
  if (data.kind !== 'trace') return;
  _ingestRow(data);
  if (!activityOpen) return;

  const tid   = data.turn_id || 'unknown';
  const turn  = _traceTurns[tid];

  // only re-render for rows we actually stored
  const isVisible = _VISIBLE_NODES.has(data.node);
  const isError   = data.status === 'error';
  const isEnd     = data.status === 'end' && !(data.summary || '').startsWith('skipped');
  if ((!isVisible && !isError) || (!isEnd && !isError)) return;

  const body  = document.getElementById('activity-body');
  let block = document.getElementById('aturn-' + tid);
  if (!block) {
    const ph = document.getElementById('activity-placeholder');
    if (ph) ph.remove();
    block = _buildTurnBlock(tid);
    if (block) body.appendChild(block);
  } else {
    // append only the newest row
    const idx = (turn.rows.length - 1);
    block.appendChild(_buildActionRow(data, tid + '-' + idx));
  }
  body.scrollTop = body.scrollHeight;
};
</script>
</body>
